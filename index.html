<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mighty Protectors — Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Bitter:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ── Palette from cover art + logo ── */
:root {
  --hdr-bg: #1a1430;
  --hdr-border: #c04010;
  --gold: #e8a820;
  --gold-lt: #f0be40;
  --red: #c04010;
  --red-lt: #d85020;
  --green: #5a9a18;
  --green-lt: #6eb828;
  --page-bg: #d6eaf8;
  --page-bg2: #c4dff0;
  --card-bg: #ffffff;
  --card-brd: #8ab4d0;
  --card-brd-empty: #b0c8d8;
  --tx: #1a1a2a;
  --tx2: #4a3a5a;
  --tx3: #7a7a8a;
  --danger: #d03030;
  --fd: 'Bangers', cursive;
  --fb: 'Bitter', serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }
html { min-height: 100%; background: var(--page-bg) }
body {
  min-height: 100vh; background: var(--page-bg);
  color: var(--tx); font-family: var(--fb); font-size: 13px;
  display: flex; flex-direction: column;
}

/* ── Header ── */
.hdr {
  background: var(--hdr-bg);
  border-bottom: 3px solid var(--hdr-border);
  padding: 0 16px;
  flex-shrink: 0;
}
.hdr-in {
  max-width: 920px; margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between;
  height: 52px; gap: 12px;
}
.hdr-logo { display: flex; align-items: center; gap: 10px }
.hdr-logo img { height: 26px; display: block }
.hdr-logo-sub {
  font-family: var(--fb); font-size: 10px; color: var(--gold);
  letter-spacing: 1.5px; font-weight: 700; opacity: 0.85;
}
.hdr-auth { display: flex; gap: 6px; align-items: center }
.btn-auth {
  padding: 5px 12px; font-size: 10px; font-family: var(--fb); font-weight: 700;
  border-radius: 3px; cursor: pointer; border: none; letter-spacing: 0.5px;
}
.btn-login { background: transparent; border: 1.5px solid var(--gold); color: var(--gold) }
.btn-login:hover { background: rgba(232,168,32,0.12) }
.btn-register { background: var(--red); color: #fff }
.btn-register:hover { background: var(--red-lt) }

/* ── Logged-in user display (hidden by default) ── */
.hdr-user { display: none; align-items: center; gap: 8px; color: #bbb; font-size: 11px }
.hdr-user .user-name { color: var(--gold); font-weight: 700 }
.btn-logout {
  padding: 4px 10px; font-size: 9px; font-family: var(--fb); font-weight: 700;
  background: #2a2040; border: 1px solid #4a3a60; color: #aaa;
  border-radius: 2px; cursor: pointer;
}
.btn-logout:hover { border-color: var(--gold); color: var(--gold) }

/* ── Main content ── */
.main { flex: 1; padding: 16px 16px 40px }
.main-in { max-width: 920px; margin: 0 auto }

/* ── Tabs ── */
.tabs { display: flex; gap: 4px; margin-bottom: 0 }
.tab {
  padding: 10px 24px; font-family: var(--fd); font-size: 17px; letter-spacing: 1px;
  color: var(--tx2); background: var(--page-bg2);
  border: 1.5px solid var(--card-brd); border-bottom: none;
  border-radius: 6px 6px 0 0; cursor: pointer;
  position: relative; top: 1px;
  transition: background 0.15s, color 0.15s;
  user-select: none;
}
.tab:hover { background: #daedf8; color: var(--tx) }
.tab.active {
  background: var(--card-bg); color: var(--hdr-bg);
  border-color: var(--card-brd);
  z-index: 1;
}
.tab-icon { margin-right: 4px; font-size: 14px }

/* ── Panel ── */
.panel {
  background: var(--card-bg);
  border: 1.5px solid var(--card-brd);
  border-radius: 0 6px 6px 6px;
  padding: 20px;
  min-height: 340px;
  position: relative;
}
.panel-hdr {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}
.panel-title {
  font-family: var(--fd); font-size: 20px; letter-spacing: 1px; color: var(--hdr-bg);
}
.btn-new {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 6px 14px; font-size: 11px; font-family: var(--fb); font-weight: 700;
  background: var(--red); color: #fff; border: none;
  border-radius: 3px; cursor: pointer; letter-spacing: 0.3px;
}
.btn-new:hover { background: var(--red-lt) }
.btn-new::before { content: '+'; font-size: 15px; font-weight: 700; line-height: 1 }

/* ── Card grid ── */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
  gap: 12px;
}

/* ── Slot card ── */
.card {
  border: 1.5px solid var(--card-brd);
  border-radius: 5px;
  padding: 14px;
  min-height: 170px;
  display: flex; flex-direction: column;
  transition: border-color 0.15s, box-shadow 0.15s;
  position: relative;
  background: var(--card-bg);
}
.card:hover { border-color: var(--gold); box-shadow: 0 2px 8px rgba(26,20,48,0.1) }
.card-name {
  font-family: var(--fd); font-size: 16px; letter-spacing: 0.5px;
  color: var(--hdr-bg); margin-bottom: 4px;
}
.card-id { font-size: 10px; color: var(--tx2); margin-bottom: 8px }
.card-stats { display: flex; flex-direction: column; gap: 3px; flex: 1 }
.card-stat {
  display: flex; align-items: center; gap: 6px;
  font-size: 10px; color: var(--tx2);
}
.card-stat-val { font-weight: 700; color: var(--tx) }
.card-badge {
  display: inline-block; padding: 1px 6px; border-radius: 2px;
  font-size: 9px; font-weight: 700; letter-spacing: 0.3px;
}
.badge-cp { background: #e8f5e0; color: var(--green) }
.badge-origin { background: #fdf3e0; color: #9a6a10 }
.badge-move { background: #e8f0fa; color: #3a6a9a }

.card-actions {
  display: flex; gap: 4px; margin-top: 10px; padding-top: 8px;
  border-top: 1px solid #e8e8f0;
}
.card-btn {
  flex: 1; padding: 5px 0; font-size: 9px; font-family: var(--fb); font-weight: 700;
  border: 1.5px solid var(--card-brd); background: var(--card-bg);
  border-radius: 2px; cursor: pointer; color: var(--tx2);
  text-align: center; transition: all 0.12s;
}
.card-btn:hover { border-color: var(--red); color: var(--red) }
.card-btn-edit { border-color: var(--red); color: var(--red) }
.card-btn-edit:hover { background: var(--red); color: #fff }
.card-btn-del:hover { border-color: var(--danger); color: var(--danger) }

/* ── Empty slot ── */
.card-empty {
  border-style: dashed;
  border-color: var(--card-brd-empty);
  background: #f4f8fc;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center;
  color: var(--tx3);
  cursor: default;
}
.card-empty:hover { border-color: var(--card-brd); box-shadow: none }
.card-empty-icon { font-size: 28px; opacity: 0.3; margin-bottom: 6px }
.card-empty-label { font-size: 11px; font-weight: 700 }
.card-empty-num { font-size: 9px; color: var(--tx3); margin-top: 2px }

/* ── Slot counter ── */
.slot-info {
  margin-top: 16px; padding-top: 12px;
  border-top: 1px solid #dce8f0;
  display: flex; align-items: center; justify-content: space-between;
  font-size: 10px; color: var(--tx3);
}
.slot-count { font-weight: 700; color: var(--tx2) }
.slot-upgrade {
  font-size: 9px; color: var(--gold); font-weight: 700;
  cursor: pointer; text-decoration: underline;
  text-decoration-style: dotted;
}
.slot-upgrade:hover { color: var(--red) }

/* ── Import bar ── */
.import-bar {
  margin-top: 14px; padding-top: 12px;
  border-top: 1px solid #dce8f0;
  display: flex; align-items: center; gap: 8px;
  font-size: 10px; color: var(--tx3);
}
.import-bar .lbl { font-weight: 700; color: var(--tx2) }
.btn-import {
  padding: 4px 10px; font-size: 9px; font-family: var(--fb); font-weight: 700;
  background: var(--page-bg); border: 1px solid var(--card-brd);
  border-radius: 2px; cursor: pointer; color: var(--tx2);
}
.btn-import:hover { border-color: var(--red); color: var(--red) }

/* ── Footer ── */
.ftr {
  font-size: 9px; color: var(--tx3); text-align: center;
  padding: 10px; background: var(--page-bg2);
  border-top: 1px solid var(--card-brd);
}

/* ── Animations ── */
@keyframes fadeSlideUp {
  from { opacity: 0; transform: translateY(12px) }
  to { opacity: 1; transform: translateY(0) }
}
.card { animation: fadeSlideUp 0.3s ease both }
.card:nth-child(1) { animation-delay: 0s }
.card:nth-child(2) { animation-delay: 0.05s }
.card:nth-child(3) { animation-delay: 0.1s }
.card:nth-child(4) { animation-delay: 0.15s }
.card:nth-child(5) { animation-delay: 0.2s }

/* ── Responsive ── */
@media (max-width: 600px) {
  .hdr-in { height: 44px }
  .hdr-logo img { height: 20px }
  .tabs { gap: 2px }
  .tab { padding: 8px 14px; font-size: 14px }
  .panel { padding: 14px }
  .card-grid { grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 8px }
}
</style>
</head>
<body>

<!-- Header -->
<div class="hdr">
  <div class="hdr-in">
    <div class="hdr-logo">
      <img src="MP_logo_v3.png" alt="Mighty Protectors">
      <span class="hdr-logo-sub">BUILDER</span>
    </div>
    <!-- Guest: show auth buttons -->
    <div class="hdr-auth" id="auth-guest">
      <button class="btn-auth btn-login" id="btn-login">LOG IN</button>
      <button class="btn-auth btn-register" id="btn-register">REGISTER</button>
    </div>
    <!-- Logged in: show user -->
    <div class="hdr-user" id="auth-user">
      <span class="user-name" id="user-name">KurtDM</span>
      <button class="btn-logout" id="btn-logout">Log Out</button>
    </div>
  </div>
</div>

<!-- Main -->
<div class="main">
<div class="main-in">

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" data-tab="chars"><span class="tab-icon">★</span>CHARACTERS</div>
    <div class="tab" data-tab="vehicles"><span class="tab-icon">◆</span>VEHICLES</div>
  </div>

  <!-- Characters Panel -->
  <div class="panel" id="panel-chars">
    <div class="panel-hdr">
      <span class="panel-title">MY CHARACTERS</span>
      <button class="btn-new" id="btn-new-char">New Character</button>
    </div>
    <div class="card-grid" id="grid-chars">
      <!-- Populated by JS -->
    </div>
    <div class="slot-info">
      <span><span class="slot-count" id="char-slot-count">2 of 5</span> character slots used</span>
      <span class="slot-upgrade">Upgrade for more slots</span>
    </div>
    <div class="import-bar">
      <span class="lbl">IMPORT:</span>
      <button class="btn-import" id="btn-import-char-json">Import JSON</button>
      <button class="btn-import" id="btn-import-char-fvtt">Import from Foundry VTT</button>
    </div>
  </div>

  <!-- Vehicles Panel -->
  <div class="panel" id="panel-vehicles" style="display:none">
    <div class="panel-hdr">
      <span class="panel-title">MY VEHICLES</span>
      <button class="btn-new" id="btn-new-veh">New Vehicle</button>
    </div>
    <div class="card-grid" id="grid-vehicles">
      <!-- Populated by JS -->
    </div>
    <div class="slot-info">
      <span><span class="slot-count" id="veh-slot-count">1 of 3</span> vehicle slots used</span>
      <span class="slot-upgrade">Upgrade for more slots</span>
    </div>
    <div class="import-bar">
      <span class="lbl">IMPORT:</span>
      <button class="btn-import" id="btn-import-veh-json">Import JSON</button>
    </div>
  </div>

</div>
</div>

<!-- Footer -->
<div class="ftr">
  Mighty Protectors&trade; &amp; Jeff Dee &amp; Jack Herman &mdash; Monkey House Games
</div>

<script>
// ── Tab switching ──
const tabs = document.querySelectorAll('.tab');
const panels = { chars: document.getElementById('panel-chars'), vehicles: document.getElementById('panel-vehicles') };
tabs.forEach(tab => {
  tab.addEventListener('click', () => {
    tabs.forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    Object.values(panels).forEach(p => p.style.display = 'none');
    panels[tab.dataset.tab].style.display = '';
  });
});

// ── Demo data ──
const CHAR_SLOTS = 5;
const VEH_SLOTS = 3;

const demoChars = [
  { name: 'Starbolt', trueId: 'Marcus Chen', cps: 150, origin: 'Modified', side: 'Good' },
  { name: 'Nightshade', trueId: 'Yuki Tanaka', cps: 175, origin: 'Psionic', side: 'Good' },
];

const demoVehs = [
  { name: 'Skyrider', dims: '8×12', cps: 210, move: 'Ground + Air', type: 'Jet' },
];

function escH(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function renderCharCard(c) {
  return `<div class="card">
    <div class="card-name">${escH(c.name)}</div>
    <div class="card-id">${escH(c.trueId)}</div>
    <div class="card-stats">
      <div class="card-stat"><span class="card-badge badge-cp">${c.cps} CPs</span></div>
      <div class="card-stat"><span class="card-badge badge-origin">${escH(c.origin)}</span></div>
      <div class="card-stat"><span style="font-size:9px;color:var(--tx3)">Side: ${escH(c.side)}</span></div>
    </div>
    <div class="card-actions">
      <button class="card-btn card-btn-edit">Edit</button>
      <button class="card-btn">Export</button>
      <button class="card-btn card-btn-del">Del</button>
    </div>
  </div>`;
}

function renderVehCard(v) {
  return `<div class="card">
    <div class="card-name">${escH(v.name)}</div>
    <div class="card-id">${escH(v.type)} / ${escH(v.dims)}</div>
    <div class="card-stats">
      <div class="card-stat"><span class="card-badge badge-cp">${v.cps} CPs</span></div>
      <div class="card-stat"><span class="card-badge badge-move">${escH(v.move)}</span></div>
    </div>
    <div class="card-actions">
      <button class="card-btn card-btn-edit">Edit</button>
      <button class="card-btn">Export</button>
      <button class="card-btn card-btn-del">Del</button>
    </div>
  </div>`;
}

function renderEmptySlot(n, total) {
  return `<div class="card card-empty">
    <div class="card-empty-icon">+</div>
    <div class="card-empty-label">Empty Slot</div>
    <div class="card-empty-num">${n} of ${total}</div>
  </div>`;
}

function renderGrid(gridId, items, renderFn, totalSlots, slotCountId) {
  const grid = document.getElementById(gridId);
  let html = items.map(renderFn).join('');
  for (let i = items.length + 1; i <= totalSlots; i++) {
    html += renderEmptySlot(i, totalSlots);
  }
  grid.innerHTML = html;
  document.getElementById(slotCountId).textContent = `${items.length} of ${totalSlots}`;
}

renderGrid('grid-chars', demoChars, renderCharCard, CHAR_SLOTS, 'char-slot-count');
renderGrid('grid-vehicles', demoVehs, renderVehCard, VEH_SLOTS, 'veh-slot-count');

// ── Auth toggle demo ──
let loggedIn = false;
function setAuth(state) {
  loggedIn = state;
  document.getElementById('auth-guest').style.display = state ? 'none' : 'flex';
  document.getElementById('auth-user').style.display = state ? 'flex' : 'none';
}
document.getElementById('btn-login').addEventListener('click', () => setAuth(true));
document.getElementById('btn-register').addEventListener('click', () => setAuth(true));
document.getElementById('btn-logout').addEventListener('click', () => setAuth(false));

// ── New buttons (placeholder) ──
document.getElementById('btn-new-char').addEventListener('click', () => {
  window.location.href = 'character.html';
});
document.getElementById('btn-new-veh').addEventListener('click', () => {
  window.location.href = 'vehicle.html';
});

// Edit buttons on cards navigate to the appropriate builder
document.addEventListener('click', (e) => {
  const btn = e.target.closest('.card-btn-edit');
  if (!btn) return;
  const card = btn.closest('.card');
  const panel = card.closest('.panel');
  if (panel.id === 'panel-chars') {
    window.location.href = 'character.html';
  } else {
    window.location.href = 'vehicle.html';
  }
});
</script>

</body>
</html>
