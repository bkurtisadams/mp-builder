</style></head><body>
<h1>${ESC(campName)}</h1>
<div class="j-subtitle">${ESC(sysName)}${camp.world?' — '+ESC(camp.world):''}${camp.gm?' — '+ESC(camp.gmTitle||'GM')+': '+ESC(camp.gm):''}</div>
${entriesHtml}
</body></html>`;

  const blob=new Blob([html],{type:'text/html'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=(campName.replace(/[^a-zA-Z0-9_-]/g,'_'))+'_journal.html';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ═══ SESSION MODAL ═══
const sesModal=document.getElementById('session-modal');
let sesEditIdx=-1,sesImageData='',sesSections=[],sesTags=[],sesRoster=[];

function buildSessionModalBody(camp,isTimeline){
  const xpLbl=GCC.xpLabel(camp.system);
  const imgPreview=sesImageData?`<img class="gcc-dlg-img-preview" src="${sesImageData}">`:'';
  let sectionsHtml='';
  if(!isTimeline){sectionsHtml=`<label class="gcc-dlg-label">SECTIONS (optional — for structured recaps)</label><div class="gcc-dlg-sections" id="sm-sections">${sesSections.map((sec,i)=>{
    const imgs=sec.images||[];
    const SIZES=['sm','md','lg','full'];const SIZE_LABELS={sm:'S',md:'M',lg:'L',full:'W'};
    const POS_LABELS={left:'◀',right:'▶',center:'◆',inline:'▬'};
    let imgTrayHtml='<div class="gcc-dlg-sec-img-tray">';
    imgs.forEach((img,j)=>{
      const posLbl=POS_LABELS[img.pos||'right']||'▶';
      imgTrayHtml+=`<div class="gcc-dlg-sec-img-thumb"><img src="${img.src}"><button class="thumb-remove" data-sec-img-rm="${i}-${j}">✕</button><button class="thumb-size" data-sec-img-size="${i}-${j}" title="Cycle size: S/M/L/W">${SIZE_LABELS[img.size||'md']}</button><button class="thumb-pos" data-sec-img-pos="${i}-${j}" title="Cycle position: L/R/C/I">${posLbl}</button></div>`;
      imgTrayHtml+=`<input class="gcc-dlg-input gcc-dlg-sec-caption" style="font-size:9px;margin:0 0 2px;padding:2px 4px" placeholder="Caption (optional)" value="${ESC(img.caption||'')}" data-sec-img-cap="${i}-${j}">`;
    });
    imgTrayHtml+=`<button class="gcc-dlg-img-btn" data-sec-img-add="${i}" style="font-size:9px;padding:2px 6px;align-self:center">+ Image</button><input type="file" data-sec-img-file="${i}" accept="image/*" style="display:none" multiple></div>`;
    return`<div class="gcc-dlg-sec-item" data-sec-idx="${i}"><div style="flex:1"><input class="gcc-dlg-input" style="margin:0 0 4px" placeholder="Section title" value="${ESC(sec.title)}" data-sec-title="${i}"><textarea class="gcc-dlg-ta" style="margin:0;min-height:50px" placeholder="Section text..." data-sec-text="${i}">${ESC(sec.text)}</textarea>${imgTrayHtml}</div><button class="gcc-dlg-sec-remove" data-sec-remove="${i}">✕</button></div>`}).join('')}</div><button class="gcc-dlg-sec-add" id="sm-add-section">+ Add Section</button><div style="margin-bottom:10px"></div>`}
  // Character participation checklist
  const chars=camp.characters||[];
  let charCheckHtml='';
  if(chars.length&&!isTimeline){
    charCheckHtml=`<label class="gcc-dlg-label">CHARACTERS IN THIS SESSION</label><div class="gcc-dlg-char-grid" id="sm-char-grid">`;
    chars.forEach(ch=>{
      let name=ch.name||'?',portrait='';
      const refKey=ch.storageKey||ch.listKey||'';
      if(refKey){try{const saved=JSON.parse(localStorage.getItem(refKey))||[];const found=ch._id?saved.find(x=>x._id===ch._id):null;if(found){name=found.heroName||found.characterName||found.name||name;portrait=found.portraitData||found.portrait||found._image||''}}catch(e){}}
      const id=ch._id||ch.name;const checked=sesRoster.includes(id);
      const ava=portrait?`<img src="${portrait}">`:`<span class="char-ph">?</span>`;
      charCheckHtml+=`<label class="gcc-dlg-char-check${checked?' checked':''}" data-char-id="${ESC(id)}">${ava} ${ESC(name)}<input type="checkbox" data-roster-id="${ESC(id)}"${checked?' checked':''}></label>`;
    });
    charCheckHtml+='</div>';
  }
  const tagPills=sesTags.map((t,i)=>{const color=LORE_COLORS[t.type]||'var(--tx3)';return`<span class="gcc-dlg-tag"><span class="tag-dot" style="background:${color};width:5px;height:5px;border-radius:50%;display:inline-block"></span> ${ESC(t.name)}<span class="tag-x" data-tag-remove="${i}">✕</span></span>`}).join('');
  // Position picker for new sessions
  let positionHtml='';
  if(sesEditIdx<0){
    const camp2=getCamp();const existingSessions=(camp2?.sessions||[]);
    const sesLbl2=GCC.sessionLabel(camp2?.system);
    let posOpts=`<option value="0">Beginning (newest)</option>`;
    let rNum=0;
    for(let i=0;i<existingSessions.length;i++){
      const es=existingSessions[i];if(es.type!=='timeline')rNum++;
      const label=es.type==='timeline'?('Timeline'+(es.title?' — '+es.title:'')):(sesLbl2+' #'+rNum+(es.title?' — '+es.title:''));
      posOpts+=`<option value="${i+1}">After ${ESC(label)}</option>`;
    }
    positionHtml=`<label class="gcc-dlg-label">POSITION</label><select class="gcc-dlg-input" id="sm-position">${posOpts}</select>`;
  }
  return`${positionHtml}<div class="gcc-dlg-row"><div><label class="gcc-dlg-label">SESSION DATE (real-world)</label><input class="gcc-dlg-input" id="sm-date" type="date"></div><div><label class="gcc-dlg-label">IN-GAME DATE (text)</label><input class="gcc-dlg-input" id="sm-gamedate" placeholder="e.g. Nov 13, 1976"></div></div><label class="gcc-dlg-label">TITLE</label><input class="gcc-dlg-input" id="sm-title" placeholder="e.g. ESU Break-In"><label class="gcc-dlg-label">SUMMARY</label><textarea class="gcc-dlg-ta" id="sm-text" rows="4" placeholder="${isTimeline?'Brief timeline note...':'What happened this session...'}" style="min-height:${isTimeline?'50':'80'}px"></textarea>${sectionsHtml}<label class="gcc-dlg-label">ARTWORK / IMAGE</label><div class="gcc-dlg-img-area" id="sm-img-area">${imgPreview}<div class="gcc-dlg-img-btns"><button class="gcc-dlg-img-btn" id="sm-img-upload">Upload</button><button class="gcc-dlg-img-btn" id="sm-img-paste">Paste</button>${sesImageData?'<button class="gcc-dlg-img-btn danger" id="sm-img-clear">Remove</button>':''}</div><input type="file" id="sm-img-file" accept="image/*" style="display:none"></div>${charCheckHtml}<label class="gcc-dlg-label">ENTITY TAGS</label><div class="gcc-dlg-tags" id="sm-tags-area">${tagPills}<input class="gcc-dlg-tag-input" id="sm-tag-input" placeholder="Type name, Enter to add..."></div><div class="gcc-dlg-row"><div><label class="gcc-dlg-label">${ESC(xpLbl.toUpperCase())} AWARDED</label><input class="gcc-dlg-input" id="sm-xp" type="number" placeholder="0"></div><div><label class="gcc-dlg-check"><input type="checkbox" id="sm-visible" checked> Visible to players</label></div></div>`;
}

function captureSessionFields(){return{date:document.getElementById('sm-date')?.value||'',gameDate:document.getElementById('sm-gamedate')?.value||'',title:document.getElementById('sm-title')?.value||'',text:document.getElementById('sm-text')?.value||'',xp:document.getElementById('sm-xp')?.value||'',visible:document.getElementById('sm-visible')?.checked!==false}}
function restoreSessionFields(vals){if(!vals)return;const f=(id,v)=>{const el=document.getElementById(id);if(el)el.value=v||''};f('sm-date',vals.date);f('sm-gamedate',vals.gameDate);f('sm-title',vals.title);f('sm-text',vals.text);f('sm-xp',vals.xp);const vis=document.getElementById('sm-visible');if(vis)vis.checked=vals.visible!==false}
function captureSessionSections(){document.querySelectorAll('[data-sec-title]').forEach(el=>{const i=parseInt(el.dataset.secTitle);if(sesSections[i])sesSections[i].title=el.value});document.querySelectorAll('[data-sec-text]').forEach(el=>{const i=parseInt(el.dataset.secText);if(sesSections[i])sesSections[i].text=el.value});document.querySelectorAll('[data-sec-img-cap]').forEach(el=>{const[si,ii]=el.dataset.secImgCap.split('-').map(Number);if(sesSections[si]&&sesSections[si].images&&sesSections[si].images[ii])sesSections[si].images[ii].caption=el.value})}

function refreshModalBody(camp,isTimeline){
  const vals=captureSessionFields();captureSessionSections();
  document.getElementById('session-modal-body').innerHTML=buildSessionModalBody(camp,isTimeline);
  restoreSessionFields(vals);wireSessionModalEvents(camp,isTimeline);
}

async function openSessionModal(editIdx,typeOverride){
  sesEditIdx=editIdx!=null?editIdx:-1;const camp=getCamp();if(!camp)return;
  const isEdit=sesEditIdx>=0;let isTimeline=typeOverride==='timeline';
  if(isEdit){const s=camp.sessions?.[sesEditIdx];if(s){
    isTimeline=s.type==='timeline';
    // Resolve cover image from IndexedDB if it's a key
    sesImageData=s.image?(GCCImages.isKey(s.image)?await GCCImages.get(s.image):s.image):'';
    // Resolve section images array
    sesSections=[];for(const sec of(s.sections||[])){
      const copy={...sec,images:[...(sec.images||[])].map(img=>({...img}))};
      for(const img of copy.images){
        if(img.src&&GCCImages.isKey(img.src))img.src=await GCCImages.get(img.src)||'';
      }
      sesSections.push(copy);
    }
    sesTags=(s.tags||[]).map(t=>({...t}));sesRoster=[...(s.roster||[])]
  }}
  else{sesImageData='';sesSections=[];sesTags=[];sesRoster=[]}
  const sesLbl=GCC.sessionLabel(camp.system);
  document.getElementById('session-modal-title').textContent=isEdit?(isTimeline?'Edit timeline entry':'Edit '+sesLbl):(isTimeline?'New timeline entry':'New '+sesLbl);
  document.getElementById('session-modal-body').innerHTML=buildSessionModalBody(camp,isTimeline);
  if(isEdit){const s=camp.sessions[sesEditIdx];restoreSessionFields({date:s.date,gameDate:s.gameDate,title:s.title,text:s.text,xp:s.xp,visible:s.visible})}
  else{document.getElementById('sm-date').value=new Date().toISOString().split('T')[0]}
  // Store type for save
  sesModal.dataset.entryType=isTimeline?'timeline':'session';
  wireSessionModalEvents(camp,isTimeline);sesModal.classList.add('open');
}

function wireSessionModalEvents(camp,isTimeline){
  document.getElementById('sm-img-upload')?.addEventListener('click',()=>document.getElementById('sm-img-file').click());
  document.getElementById('sm-img-file')?.addEventListener('change',e=>{const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=ev=>{sesImageData=ev.target.result;refreshModalBody(camp,isTimeline)};reader.readAsDataURL(file)});
  document.getElementById('sm-img-paste')?.addEventListener('click',async()=>{try{const items=await navigator.clipboard.read();for(const item of items){const imgType=item.types.find(t=>t.startsWith('image/'));if(imgType){const blob=await item.getType(imgType);const reader=new FileReader();reader.onload=ev=>{sesImageData=ev.target.result;refreshModalBody(camp,isTimeline)};reader.readAsDataURL(blob);return}}}catch(e){console.warn('Clipboard paste failed:',e)}});
  document.getElementById('sm-img-clear')?.addEventListener('click',()=>{sesImageData='';refreshModalBody(camp,isTimeline)});
  if(!isTimeline){document.getElementById('sm-add-section')?.addEventListener('click',()=>{captureSessionSections();sesSections.push({title:'',text:'',images:[]});refreshModalBody(camp,isTimeline)});
    document.querySelectorAll('[data-sec-remove]').forEach(btn=>{btn.addEventListener('click',()=>{captureSessionSections();sesSections.splice(parseInt(btn.dataset.secRemove),1);refreshModalBody(camp,isTimeline)})});
    // Multi-image: add images to section
    document.querySelectorAll('[data-sec-img-add]').forEach(btn=>{btn.addEventListener('click',()=>{const fi=document.querySelector(`[data-sec-img-file="${btn.dataset.secImgAdd}"]`);if(fi)fi.click()})});
    document.querySelectorAll('[data-sec-img-file]').forEach(fi=>{fi.addEventListener('change',e=>{const files=Array.from(e.target.files);if(!files.length)return;const idx=parseInt(fi.dataset.secImgFile);captureSessionSections();let loaded=0;files.forEach(file=>{const reader=new FileReader();reader.onload=ev=>{if(sesSections[idx]){if(!sesSections[idx].images)sesSections[idx].images=[];sesSections[idx].images.push({src:ev.target.result,size:'md',pos:'right',caption:''})}loaded++;if(loaded===files.length)refreshModalBody(camp,isTimeline)};reader.readAsDataURL(file)})})});
    // Multi-image: remove individual image
    document.querySelectorAll('[data-sec-img-rm]').forEach(btn=>{btn.addEventListener('click',()=>{const[si,ii]=btn.dataset.secImgRm.split('-').map(Number);captureSessionSections();if(sesSections[si]&&sesSections[si].images)sesSections[si].images.splice(ii,1);refreshModalBody(camp,isTimeline)})});
    // Multi-image: cycle size
    document.querySelectorAll('[data-sec-img-size]').forEach(btn=>{btn.addEventListener('click',()=>{const[si,ii]=btn.dataset.secImgSize.split('-').map(Number);captureSessionSections();if(sesSections[si]&&sesSections[si].images&&sesSections[si].images[ii]){const SIZES=['sm','md','lg','full'];const cur=sesSections[si].images[ii].size||'md';sesSections[si].images[ii].size=SIZES[(SIZES.indexOf(cur)+1)%SIZES.length]}refreshModalBody(camp,isTimeline)})});
    // Multi-image: cycle position
    document.querySelectorAll('[data-sec-img-pos]').forEach(btn=>{btn.addEventListener('click',()=>{const[si,ii]=btn.dataset.secImgPos.split('-').map(Number);captureSessionSections();if(sesSections[si]&&sesSections[si].images&&sesSections[si].images[ii]){const POSITIONS=['right','left','center','inline'];const cur=sesSections[si].images[ii].pos||'right';sesSections[si].images[ii].pos=POSITIONS[(POSITIONS.indexOf(cur)+1)%POSITIONS.length]}refreshModalBody(camp,isTimeline)})});
  }
  document.querySelectorAll('[data-roster-id]').forEach(cb=>{cb.addEventListener('change',()=>{const id=cb.dataset.rosterId;if(cb.checked){if(!sesRoster.includes(id))sesRoster.push(id)}else{sesRoster=sesRoster.filter(r=>r!==id)}cb.closest('.gcc-dlg-char-check').classList.toggle('checked',cb.checked)})});
  document.querySelectorAll('[data-tag-remove]').forEach(btn=>{btn.addEventListener('click',()=>{sesTags.splice(parseInt(btn.dataset.tagRemove),1);refreshModalBody(camp,isTimeline)})});
  const tagInput=document.getElementById('sm-tag-input');
  if(tagInput){tagInput.addEventListener('keydown',e=>{if(e.key==='Enter'&&tagInput.value.trim()){e.preventDefault();const name=tagInput.value.trim();const camp=getCamp();const loreMatch=(camp?.lore||[]).find(l=>l.name.toLowerCase()===name.toLowerCase());sesTags.push({name,type:loreMatch?loreMatch.type:'other'});tagInput.value='';refreshModalBody(camp,isTimeline);document.getElementById('sm-tag-input')?.focus()}});
    document.getElementById('sm-tags-area')?.addEventListener('click',e=>{if(e.target===e.currentTarget)tagInput.focus()})}
}

function closeSessionModal(){sesModal.classList.remove('open');sesEditIdx=-1;delete sesModal.dataset.entryType}
// Resize image data URL to fit localStorage safely (max ~800KB)
function compressImageData(dataUrl,maxKB,cb){
  if(!dataUrl||dataUrl.length<maxKB*1024){cb(dataUrl);return}
  const img=new Image();img.onload=()=>{
    const canvas=document.createElement('canvas');let w=img.width,h=img.height;
    const maxDim=1600;if(w>maxDim||h>maxDim){const r=Math.min(maxDim/w,maxDim/h);w=Math.round(w*r);h=Math.round(h*r)}
    canvas.width=w;canvas.height=h;const ctx=canvas.getContext('2d');ctx.drawImage(img,0,0,w,h);
    // Detect alpha: sample corners + center edge pixels
    const hasAlpha=(()=>{try{const spots=[[0,0],[w-1,0],[0,h-1],[w-1,h-1],[Math.floor(w/2),0],[0,Math.floor(h/2)]];for(const[x,y]of spots){if(ctx.getImageData(x,y,1,1).data[3]<250)return true}return false}catch(e){return false}})();
    if(hasAlpha){
      let result=canvas.toDataURL('image/png');
      console.log('[GCC] Image compressed (PNG, alpha preserved):',Math.round(dataUrl.length/1024)+'KB →',Math.round(result.length/1024)+'KB');
      cb(result);
    }else{
      let quality=0.85,result=canvas.toDataURL('image/jpeg',quality);
      while(result.length>maxKB*1024&&quality>0.4){quality-=0.05;result=canvas.toDataURL('image/jpeg',quality)}
      console.log('[GCC] Image compressed (JPEG):',Math.round(dataUrl.length/1024)+'KB →',Math.round(result.length/1024)+'KB','q='+quality.toFixed(2));
      cb(result);
    }
  };img.onerror=()=>cb(dataUrl);img.src=dataUrl;
}

document.getElementById('sm-save').addEventListener('click',async()=>{
  const camp=getCamp();if(!camp)return;const sessions=camp.sessions||[];captureSessionSections();
  const rawImage=sesImageData||'';

  // Store cover image in IndexedDB
  let imageKey='';
  if(rawImage){
    // Compress first
    const compressed=await new Promise(resolve=>compressImageData(rawImage,800,resolve));
    imageKey=await GCCImages.store(compressed,'img_ses');
    console.log('[GCC] Stored cover image:',imageKey,Math.round(compressed.length/1024)+'KB');
  }

  // Store section images in IndexedDB
  for(const sec of sesSections){
    for(const img of(sec.images||[])){
      if(img.src&&GCCImages.isDataUrl(img.src)){
        const compressed=await new Promise(resolve=>compressImageData(img.src,400,resolve));
        img.src=await GCCImages.store(compressed,'img_sec');
        console.log('[GCC] Stored section image:',img.src,Math.round(compressed.length/1024)+'KB');
      }
    }
  }

  const entry={_id:(sesEditIdx>=0&&sessions[sesEditIdx])?sessions[sesEditIdx]._id:GCC.genId('ses'),
    date:document.getElementById('sm-date').value||'',gameDate:document.getElementById('sm-gamedate').value.trim()||'',
    title:document.getElementById('sm-title').value.trim()||'',text:document.getElementById('sm-text').value.trim()||'',
    sections:sesSections.filter(s=>s.title||s.text||(s.images&&s.images.length)),image:imageKey,tags:sesTags,
    roster:sesRoster.length?sesRoster:[],
    xp:parseInt(document.getElementById('sm-xp').value)||0,visible:document.getElementById('sm-visible').checked,
    type:sesModal.dataset.entryType||'session'};
  if(sesEditIdx>=0&&sessions[sesEditIdx]){entry.type=sessions[sesEditIdx].type}
  if(sesEditIdx>=0&&sesEditIdx<sessions.length){sessions[sesEditIdx]=entry}else{
    const posEl=document.getElementById('sm-position');
    const insertAt=posEl?parseInt(posEl.value):0;
    sessions.splice(insertAt,0,entry);
  }
  console.log('[GCC] Saving session, entries:',sessions.length);
  GCC.updateCampaign(campId,{sessions,session:countRealSessions(sessions)});closeSessionModal();render();
});
document.getElementById('sm-cancel').addEventListener('click',closeSessionModal);
document.getElementById('session-modal-close').addEventListener('click',closeSessionModal);
sesModal.addEventListener('click',e=>{if(e.target===sesModal)closeSessionModal()});

// ═══ LORE MODAL ═══
const loreModal=document.getElementById('lore-modal');let loreEditIdx=-1,loreImageData='';
function captureLoreFields(){return{type:document.getElementById('lm-type')?.value||'npc',subtype:document.getElementById('lm-subtype')?.value||'',name:document.getElementById('lm-name')?.value||'',desc:document.getElementById('lm-desc')?.value||''}}
function restoreLoreFields(v){if(!v)return;const f=(id,val)=>{const el=document.getElementById(id);if(el)el.value=val||''};f('lm-subtype',v.subtype);f('lm-name',v.name);f('lm-desc',v.desc);const sel=document.getElementById('lm-type');if(sel)sel.value=v.type||'npc'}
function buildLoreModalBody(l){
  const typeOptions=GCC.LORE_TYPES.map(t=>`<option value="${t}"${l&&l.type===t?' selected':''}>${GCC.LORE_TYPE_LABELS[t]}</option>`).join('');
  const imgPreview=loreImageData?`<img class="gcc-dlg-img-preview" src="${loreImageData}">`:'';
  return`<div class="gcc-dlg-row"><div><label class="gcc-dlg-label">TYPE</label><select class="gcc-dlg-select" id="lm-type">${typeOptions}</select></div><div><label class="gcc-dlg-label">SUBTYPE (optional)</label><input class="gcc-dlg-input" id="lm-subtype" placeholder="e.g. Villain, HQ Room" value="${l?ESC(l.subtype||''):''}"></div></div><label class="gcc-dlg-label">NAME</label><input class="gcc-dlg-input" id="lm-name" placeholder="e.g. Whiplash, ESU Campus" value="${l?ESC(l.name):''}"><label class="gcc-dlg-label">DESCRIPTION</label><textarea class="gcc-dlg-ta" id="lm-desc" rows="3" placeholder="Brief description...">${l?ESC(l.desc||''):''}</textarea><label class="gcc-dlg-label">IMAGE</label><div class="gcc-dlg-img-area" id="lm-img-area">${imgPreview}<div class="gcc-dlg-img-btns"><button class="gcc-dlg-img-btn" id="lm-img-upload">Upload</button><button class="gcc-dlg-img-btn" id="lm-img-paste">Paste</button>${loreImageData?'<button class="gcc-dlg-img-btn danger" id="lm-img-clear">Remove</button>':''}</div><input type="file" id="lm-img-file" accept="image/*" style="display:none"></div>`;
}
function wireLoreModalEvents(){
  document.getElementById('lm-img-upload')?.addEventListener('click',()=>document.getElementById('lm-img-file').click());
  document.getElementById('lm-img-file')?.addEventListener('change',e=>{const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=ev=>{loreImageData=ev.target.result;refreshLoreModalBody()};reader.readAsDataURL(file)});
  document.getElementById('lm-img-paste')?.addEventListener('click',async()=>{try{const items=await navigator.clipboard.read();let found=false;for(const item of items){const imgType=item.types.find(t=>t.startsWith('image/'));if(imgType){const blob=await item.getType(imgType);const reader=new FileReader();reader.onload=ev=>{loreImageData=ev.target.result;refreshLoreModalBody()};reader.readAsDataURL(blob);found=true;break}}if(!found){const btn=document.getElementById('lm-img-paste');if(btn){btn.textContent='No image on clipboard';setTimeout(()=>{btn.textContent='Paste'},2000)}}}catch(e){console.warn('Clipboard paste failed:',e);const btn=document.getElementById('lm-img-paste');if(btn){btn.textContent='Paste blocked';setTimeout(()=>{btn.textContent='Paste'},2000)}}});
  document.getElementById('lm-img-clear')?.addEventListener('click',()=>{loreImageData='';refreshLoreModalBody()});
}
function refreshLoreModalBody(){
  const vals=captureLoreFields();
  const camp=getCamp();const l=loreEditIdx>=0?(camp?.lore||[])[loreEditIdx]:null;
  document.getElementById('lore-modal-body').innerHTML=buildLoreModalBody(l);
  restoreLoreFields(vals);wireLoreModalEvents();
}
async function openLoreModal(editIdx){
  loreEditIdx=editIdx!=null?editIdx:-1;const camp=getCamp();if(!camp)return;const isEdit=loreEditIdx>=0;
  document.getElementById('lore-modal-title').textContent=isEdit?'Edit wiki entry':'New wiki entry';
  const l=isEdit?(camp.lore||[])[loreEditIdx]:null;
  if(isEdit&&l&&l.image){loreImageData=GCCImages.isKey(l.image)?await GCCImages.get(l.image):l.image}else{loreImageData=''}
  document.getElementById('lore-modal-body').innerHTML=buildLoreModalBody(l);
  wireLoreModalEvents();
  loreModal.classList.add('open');
}
function closeLoreModal(){loreModal.classList.remove('open');loreEditIdx=-1;loreImageData=''}
document.getElementById('lm-save').addEventListener('click',async()=>{const camp=getCamp();if(!camp)return;const lore=camp.lore||[];
  let imageKey='';
  if(loreImageData){
    const compressed=await new Promise(resolve=>compressImageData(loreImageData,400,resolve));
    imageKey=await GCCImages.store(compressed,'img_lore');
  } else if(loreEditIdx>=0&&lore[loreEditIdx]&&lore[loreEditIdx].image){
    // Image was removed — leave imageKey empty
  }
  const entry={_id:(loreEditIdx>=0&&lore[loreEditIdx])?lore[loreEditIdx]._id:GCC.genId('lore'),type:document.getElementById('lm-type').value,subtype:document.getElementById('lm-subtype').value.trim(),name:document.getElementById('lm-name').value.trim()||'Unnamed',desc:document.getElementById('lm-desc').value.trim(),image:imageKey};
  if(loreEditIdx>=0&&loreEditIdx<lore.length){lore[loreEditIdx]=entry}else{lore.push(entry)}
  GCC.updateCampaign(campId,{lore});closeLoreModal();render()});
document.getElementById('lm-cancel').addEventListener('click',closeLoreModal);
document.getElementById('lore-modal-close').addEventListener('click',closeLoreModal);
loreModal.addEventListener('click',e=>{if(e.target===loreModal)closeLoreModal()});

// ═══ LORE IMPORT MODAL ═══
const loreImportModal=document.getElementById('lore-import-modal');
function openLoreImportModal(){
  document.getElementById('lim-json').value='';
  document.getElementById('lim-status').textContent='';
  document.getElementById('lim-skip-dupes').checked=true;
  loreImportModal.classList.add('open');
}
function closeLoreImportModal(){loreImportModal.classList.remove('open')}
document.getElementById('lim-close').addEventListener('click',closeLoreImportModal);
document.getElementById('lim-cancel').addEventListener('click',closeLoreImportModal);
loreImportModal.addEventListener('click',e=>{if(e.target===loreImportModal)closeLoreImportModal()});
document.getElementById('lim-file-btn').addEventListener('click',()=>document.getElementById('lim-file').click());
document.getElementById('lim-file').addEventListener('change',e=>{
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{document.getElementById('lim-json').value=ev.target.result;document.getElementById('lim-status').textContent=file.name+' loaded'};
  reader.readAsText(file);
});
document.getElementById('lim-import').addEventListener('click',()=>{
  const camp=getCamp();if(!camp)return;
  const raw=document.getElementById('lim-json').value.trim();
  if(!raw){document.getElementById('lim-status').textContent='Paste or upload JSON first.';return}
  let arr;
  try{arr=JSON.parse(raw)}catch(e){document.getElementById('lim-status').textContent='Invalid JSON: '+e.message;return}
  if(!Array.isArray(arr)){document.getElementById('lim-status').textContent='JSON must be an array of objects.';return}
  const validTypes=GCC.LORE_TYPES;
  const lore=camp.lore||[];
  const existingNames=new Set(lore.map(l=>l.name.toLowerCase()));
  const skipDupes=document.getElementById('lim-skip-dupes').checked;
  let added=0,skipped=0,invalid=0;
  arr.forEach(item=>{
    if(!item||typeof item!=='object'){invalid++;return}
    const name=(item.name||'').trim();
    if(!name){invalid++;return}
    let type=(item.type||'other').toLowerCase().trim();
    if(!validTypes.includes(type)){type='other'}
    if(skipDupes&&existingNames.has(name.toLowerCase())){skipped++;return}
    lore.push({
      _id:GCC.genId('lore'),
      type:type,
      subtype:(item.subtype||'').trim(),
      name:name,
      desc:(item.desc||item.description||'').trim(),
      image:''
    });
    existingNames.add(name.toLowerCase());
    added++;
  });
  if(added>0){GCC.updateCampaign(campId,{lore})}
  const parts=[];
  if(added)parts.push(added+' imported');
  if(skipped)parts.push(skipped+' duplicates skipped');
  if(invalid)parts.push(invalid+' invalid entries');
  document.getElementById('lim-status').textContent=parts.join(', ')+'.';
  if(added>0){setTimeout(()=>{closeLoreImportModal();render()},1200)}
});

// ═══ VEHICLE ASSIGN MODAL ═══
const vehModal=document.getElementById('veh-modal');
function openVehicleAssignModal(){
  const vehKey=GCC.KEYS.mpVehs;
  const allVehs=JSON.parse(localStorage.getItem(vehKey))||[];
  if(!allVehs.length){alert('No vehicles found. Create vehicles in the Vehicle Builder first.');return}
  let html='<div style="margin-bottom:8px;font-size:12px;color:var(--tx2)">Select vehicles to assign to this campaign:</div>';
  html+='<div style="display:flex;flex-direction:column;gap:6px">';
  allVehs.forEach(v=>{
    const assigned=v._campaign===campId;
    const takenElsewhere=v._campaign&&v._campaign!==campId;
    const portrait=v.pictureData||v._image||'';
    const ava=portrait?`<img src="${portrait}" style="width:24px;height:24px;border-radius:3px;object-fit:contain;border:1px solid var(--brd)">`:`<span style="width:24px;height:24px;border-radius:3px;background:var(--bg-section);display:inline-flex;align-items:center;justify-content:center;font-size:12px;color:var(--tx3)">🚗</span>`;
    const sub=[v.model,v._totalCost!=null?v._totalCost+' CPs':''].filter(Boolean).join(' · ');
    const disabled=takenElsewhere?' disabled':'';
    const note=takenElsewhere?' <span style="font-size:9px;color:var(--tx3)">(assigned elsewhere)</span>':'';
    html+=`<label class="gcc-dlg-char-check${assigned?' checked':''}" style="padding:6px 10px;${takenElsewhere?'opacity:0.5':''}"><input type="checkbox" data-veh-assign="${ESC(v._id)}"${assigned?' checked':''}${disabled}> ${ava} <span style="margin-left:4px"><strong>${ESC(v.name||'Unnamed')}</strong>${sub?' <span style="font-size:10px;color:var(--tx3)">'+ESC(sub)+'</span>':''}${note}</span></label>`;
  });
  html+='</div>';
  document.getElementById('veh-modal-body').innerHTML=html;
  // Wire checkbox visual toggle
  vehModal.querySelectorAll('[data-veh-assign]').forEach(cb=>{cb.addEventListener('change',()=>{cb.closest('.gcc-dlg-char-check').classList.toggle('checked',cb.checked)})});
  vehModal.classList.add('open');
}
function closeVehModal(){vehModal.classList.remove('open')}
document.getElementById('vm-save').addEventListener('click',()=>{
  const vehKey=GCC.KEYS.mpVehs;
  const list=JSON.parse(localStorage.getItem(vehKey))||[];
  vehModal.querySelectorAll('[data-veh-assign]').forEach(cb=>{
    const vehId=cb.dataset.vehAssign;
    const veh=list.find(v=>v._id===vehId);
    if(!veh)return;
    if(cb.checked){veh._campaign=campId}
    else if(veh._campaign===campId){veh._campaign=''}
  });
  localStorage.setItem(vehKey,JSON.stringify(list));
  closeVehModal();render();
});
document.getElementById('vm-cancel').addEventListener('click',closeVehModal);
document.getElementById('veh-modal-close').addEventListener('click',closeVehModal);
vehModal.addEventListener('click',e=>{if(e.target===vehModal)closeVehModal()});

render();
window.addEventListener('gcc-sync-ready',()=>{render()});
</script>
