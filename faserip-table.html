<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FASERIP — Universal Table</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700;900&family=Barlow+Condensed:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Cinzel:wght@500;700&family=Alegreya:ital,wght@0,400;0,700;1,400&family=Alegreya+SC:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="gcc-header.css">
<style>
:root {
  --white:#fff;--paper:#f5f5f0;
  --green:#22bb22;--yellow:#f0d800;--red:#cc1111;
  --dark:#111;--mid:#444;--soft:#666;--mute:#999;
  --fd:'Oswald','Impact',sans-serif;
  --fb:'Barlow Condensed','Arial Narrow',sans-serif;
  --bg:#d6eaf8;--bg2:#c4dff0;
  --accent:#c05a00;
  --col-hdr:#e8e8e0;
  --rcw:44px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{min-height:100%;background:var(--bg)}
body{min-height:100vh;background:var(--bg);color:var(--dark);font-family:var(--fb);font-size:12px;display:flex;flex-direction:column}

/* ── FASERIP Toolbar ── */
.fas-hdr{background:var(--gcc-mp-bg);border-bottom:3px solid var(--gcc-mp-brd);padding:0 12px;flex-shrink:0}
.fas-hdr-in{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;min-height:40px;gap:8px;flex-wrap:wrap;padding:4px 0}
.fas-logo-wrap{display:flex;align-items:center;gap:8px}
.fas-logo-title{font-family:var(--fd);font-size:22px;color:var(--gcc-mp-tx);letter-spacing:2px;text-shadow:1px 1px 0 rgba(0,0,0,.15)}
.fas-logo-sub{font-family:var(--fb);font-size:9px;color:var(--gcc-mp-sub);letter-spacing:1px}
.fas-hdr-btns{display:flex;gap:3px;align-items:center;flex-wrap:wrap}
.hdr-btn{padding:3px 7px;font-size:9px;background:var(--gcc-mp-btn-bg);border:1px solid var(--gcc-mp-btn-brd);color:var(--gcc-mp-btn-tx);border-radius:2px;cursor:pointer;font-family:var(--fb);font-weight:700;text-decoration:none}
.hdr-btn:hover{border-color:var(--gcc-mp-btn-hover-brd);background:var(--gcc-mp-btn-hover-bg)}

/* ── Footer ── */
.fas-ftr{font-size:8px;color:#3a5a70;text-align:center;padding:6px;background:var(--bg2);border-top:1px solid #8ab4d0;margin-top:auto}

/* ── Main Content ── */
.ut-wrap{flex:1;overflow:auto;padding:10px;-webkit-overflow-scrolling:touch}
.ut-inner{margin:0 auto;width:fit-content}

/* ══ Shared column sizing ══ */
.ut-col-roll{width:48px;min-width:48px}
.ut-col-rank{width:var(--rcw);min-width:var(--rcw);max-width:var(--rcw)}

/* ══ ACTION TYPES TABLE ══ */
table.action-tbl{border-collapse:collapse;font-family:var(--fb);font-size:10px;table-layout:fixed;margin-bottom:10px}
.action-tbl th,.action-tbl td{border:1px solid #000;padding:1px 2px;text-align:center;vertical-align:middle;line-height:1.15;overflow:hidden}
.action-tbl thead th{background:var(--col-hdr);font-family:var(--fd);font-weight:700}
.action-tbl .at-abbr{font-size:14px;font-weight:900;font-family:var(--fd);line-height:1}
.action-tbl .at-name{font-size:7px;font-weight:600;line-height:1.05}
.action-tbl .at-ability{font-size:7px;color:var(--soft);font-style:italic}
.action-tbl .row-w{background:var(--white)}
.action-tbl .row-g{background:var(--green)}
.action-tbl .row-y{background:var(--yellow)}
.action-tbl .row-r{background:var(--red);color:#fff}
.action-tbl .row-label{font-weight:900;font-family:var(--fd);font-size:10px;text-align:left;padding-left:4px}

/* ══ RANK REFERENCE TABLE ══ */
table.rank-tbl{border-collapse:collapse;font-family:var(--fb);font-size:10px;table-layout:fixed;margin-bottom:6px}
.rank-tbl th,.rank-tbl td{border:1px solid #000;padding:1px 2px;text-align:center;vertical-align:middle;overflow:hidden}
.rank-tbl thead th{background:var(--col-hdr);font-family:var(--fd);font-weight:700}
.rank-tbl .rk-abbr{font-size:16px;font-weight:900;font-family:var(--fd);line-height:1}
.rank-tbl .rk-name{font-size:7px;font-weight:600;line-height:1.05}
.rank-tbl .rk-val{font-weight:700;font-size:10px}
.rank-tbl .rk-range{font-size:8px;color:var(--mid)}

/* ══ UNIVERSAL TABLE GRID ══ */
table.ut-grid{border-collapse:collapse;font-family:var(--fd);font-size:10px;table-layout:fixed}
.ut-grid th,.ut-grid td{border:1px solid #888;padding:0;text-align:center;vertical-align:middle;height:18px}
.ut-grid .ut-roll{font-weight:700;font-size:10px;background:#e0eff8;color:#000;text-align:right;padding-right:5px;border-color:#789;font-family:var(--fb)}
.ut-grid thead th{background:var(--col-hdr);font-family:var(--fd);font-weight:700;font-size:10px;height:20px;border-color:#000}
.ut-grid .c-w{background:var(--white)}
.ut-grid .c-g{background:var(--green)}
.ut-grid .c-y{background:var(--yellow)}
.ut-grid .c-r{background:var(--red)}

/* ── Cell crosshair highlight ── */
.ut-grid td.cell-hl{outline:2px solid #000;outline-offset:-1px;z-index:2;position:relative}
.ut-grid td.col-hl{background-image:linear-gradient(rgba(0,0,0,.08),rgba(0,0,0,.08))}
.ut-grid td.row-hl{background-image:linear-gradient(rgba(0,0,0,.08),rgba(0,0,0,.08))}
.ut-grid .ut-roll.row-hl{background:#c0dae8}

/* ── Dice roll row highlight ── */
.ut-grid tr.dice-hl td.ut-roll{background:#f8e0a0;font-weight:900}
.ut-grid tr.dice-hl{outline:2px solid var(--accent);outline-offset:-1px}

/* ── Tooltip ── */
.ut-tip{
  position:fixed;pointer-events:none;z-index:500;
  background:#1a1a2e;color:#fff;font-family:var(--fb);font-size:11px;font-weight:700;
  padding:3px 8px;border-radius:3px;white-space:nowrap;
  display:none;
}

/* ── Dice Roller ── */
.dice-bar{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.dice-btn{
  font-family:var(--fd);font-size:14px;font-weight:900;letter-spacing:1px;
  padding:6px 18px;border:2px solid #000;border-radius:3px;cursor:pointer;
  background:var(--paper);color:#000;transition:all .12s;
}
.dice-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.dice-btn:active{transform:scale(.96)}
.dice-result{font-family:var(--fd);font-size:22px;font-weight:900;min-width:40px;text-align:center}
.dice-color{display:inline-block;width:18px;height:18px;border-radius:3px;border:1px solid #000;vertical-align:middle;margin-left:4px}

/* ── Print ── */
@media print{
  .gcc-bar,.fas-hdr,.fas-ftr,.dice-bar,.gcc-tools-overlay,.ut-tip{display:none!important}
  .ut-wrap{padding:0}
  html,body{background:#fff}
}
@media(max-width:600px){
  .fas-logo-title{font-size:16px}
}
</style>
</head>
<body>

<!-- GCC Site Bar -->
<div id="gcc-bar" class="gcc-bar">
  <div class="gcc-bar-in">
    <a href="index.html" class="gcc-brand" title="Back to Dashboard">
      <img src="graycloak-icon-t64.png" alt="" class="gcc-brand-icon">
      <div class="gcc-title-wrap">
        <div class="gcc-title">GRAYCLOAK'S CAMPAIGN CORNER</div>
        <div class="gcc-subtitle">Your Tabletop Toolkit</div>
      </div>
    </a>
    <div class="gcc-nav">
      <div class="gcc-tools-wrap">
        <button class="gcc-nav-btn" id="gcc-btn-tools">🎲 Tools ▾</button>
        <div class="gcc-tools-dd" id="gcc-tools-dd"></div>
      </div>
      <button class="gcc-nav-btn" id="gcc-btn-theme" title="Toggle light/dark"><span id="gcc-theme-icon">◑</span></button>
    </div>
  </div>
</div>
<div class="gcc-tools-overlay" id="gcc-tools-overlay"></div>

<!-- FASERIP Toolbar -->
<div class="fas-hdr">
  <div class="fas-hdr-in">
    <div class="fas-logo-wrap">
      <div>
        <div class="fas-logo-title">FASERIP</div>
        <div class="fas-logo-sub">UNIVERSAL TABLE</div>
      </div>
    </div>
    <div class="fas-hdr-btns">
      <a class="hdr-btn" href="faserip.html">Character Sheet</a>
      <button class="hdr-btn" id="btn-print" title="Print Table">Print</button>
    </div>
  </div>
</div>

<div class="ut-wrap">
<div class="ut-inner">

<!-- Dice Roller -->
<div class="dice-bar">
  <button class="dice-btn" id="btn-roll">ROLL d100</button>
  <span class="dice-result" id="dice-result">—</span>
  <span class="dice-color" id="dice-color" title="Result color"></span>
</div>

<!-- All tables rendered by JS for consistent column sizing -->
<div id="action-mount"></div>
<div id="rank-mount"></div>
<div id="grid-mount"></div>

<!-- Tooltip -->
<div class="ut-tip" id="ut-tip"></div>

</div>
</div>

<div class="fas-ftr">FASERIP Universal Table — Graycloak's Campaign Corner</div>

<script src="gcc-header.js"></script>
<script>
// ══════════════════════════════════════════════════════════════
// DATA
// ══════════════════════════════════════════════════════════════

const ACTIONS = [
  {name:'Blunt\nAttacks',abbr:'BA',ability:'Fighting'},
  {name:'Edged\nAttacks',abbr:'EA',ability:'Fighting'},
  {name:'Shooting\nAttacks',abbr:'Sh',ability:'Agility'},
  {name:'Throwing\nEdged',abbr:'TE',ability:'Agility'},
  {name:'Throwing\nBlunt',abbr:'TB',ability:'Agility'},
  {name:'Energy',abbr:'En',ability:'Agility'},
  {name:'Force',abbr:'Fo',ability:'Agility'},
  {name:'Grap-\npling',abbr:'Gp',ability:'Strength'},
  {name:'Grab-\nbing',abbr:'Gb',ability:'Strength'},
  {name:'Escap-\ning',abbr:'Es',ability:'Strength'},
  {name:'Charg-\ning',abbr:'Ch',ability:'Endur-\nance'},
  {name:'Dodging',abbr:'Do',ability:'Agility'},
  {name:'Evad-\ning',abbr:'Ev',ability:'Fighting'},
  {name:'Blocking',abbr:'Bl',ability:'Strength'},
  {name:'Catching',abbr:'Ca',ability:'Agility'},
  {name:'Stun?',abbr:'St',ability:'Endur-\nance'},
  {name:'Slam?',abbr:'Sl',ability:'Endur-\nance'},
  {name:'Kill?',abbr:'Ki',ability:'Endur-\nance'},
];

const RESULT_ROWS = [
  {label:'White',cls:'row-w',data:['Miss','Miss','Miss','Miss','Miss','Miss','Miss','Miss','Miss','Miss','Miss','None','Autohit','-6 CS','Autohit','1-10','Gr. Slam','En. Loss']},
  {label:'Green',cls:'row-g',data:['Hit','Hit','Hit','Hit','Hit','Hit','Hit','Miss','Take','Miss','Hit','-2 CS','Evasion','-4 CS','Miss','1','1 area','E/S']},
  {label:'Yellow',cls:'row-y',data:['Slam','Stun','Bullseye','Stun','Hit','Bullseye','Bullseye','Partial','Grab','Escape','Slam','-4 CS','+1 CS','-2 CS','Damage','No','Stagger','No']},
  {label:'Red',cls:'row-r',data:['Stun','Kill','Kill','Kill','Stun','Kill','Stun','Hold','Break','Reverse','Stun','-6 CS','+2 CS','+1 CS','Catch','No','No','No']},
];

const RANKS = [
  {abbr:'0',name:'Shift',val:'0',range:'0'},
  {abbr:'Fe',name:'Feeble',val:'2',range:'1-2'},
  {abbr:'Pr',name:'Poor',val:'4',range:'3-4'},
  {abbr:'Ty',name:'Typical',val:'6',range:'5-7'},
  {abbr:'Gd',name:'Good',val:'10',range:'8-15'},
  {abbr:'Ex',name:'Excellent',val:'20',range:'16-25'},
  {abbr:'Rm',name:'Remarkable',val:'30',range:'26-36'},
  {abbr:'In',name:'Incredible',val:'40',range:'37-45'},
  {abbr:'Am',name:'Amazing',val:'50',range:'46-62'},
  {abbr:'Mn',name:'Monstrous',val:'75',range:'63-87'},
  {abbr:'Un',name:'Unearthly',val:'100',range:'88-125'},
  {abbr:'X',name:'Shift X',val:'150',range:'126-175'},
  {abbr:'Y',name:'Shift Y',val:'200',range:'176-350'},
  {abbr:'Z',name:'Shift Z',val:'500',range:'351+'},
  {abbr:'1000',name:'Class',val:'1000',range:''},
  {abbr:'3000',name:'Class',val:'3000',range:''},
  {abbr:'5000',name:'Class',val:'5000',range:''},
  {abbr:'B',name:'Beyond',val:'\u221e',range:''},
];

const RANK_LABELS = RANKS.map(r => r.abbr);

const ROLL_ROWS = [
  '01','02-03','04-06','07-10','11-15','16-20','21-25','26-30',
  '31-35','36-40','41-45','46-50','51-55','56-60','61-65','66-70',
  '71-75','76-80','81-85','86-90','91-94','95-97','98-99','100'
];

const TABLE_DATA = [
  ['w','w','w','w','w','w','w','w','w','w','w','w','w','w','w','w','w','w'],
  ['w','w','w','w','w','w','w','w','w','w','w','w','w','w','g','g','g','g'],
  ['w','w','w','w','w','w','w','w','w','w','w','w','w','g','g','g','g','g'],
  ['w','w','w','w','w','w','w','w','w','w','w','w','g','g','g','g','g','g'],
  ['w','w','w','w','w','w','w','w','w','w','w','g','g','g','g','g','g','g'],
  ['w','w','w','w','w','w','w','w','w','w','g','g','g','g','g','g','g','g'],
  ['w','w','w','w','w','w','w','w','w','g','g','g','g','g','g','g','g','y'],
  ['w','w','w','w','w','w','w','w','g','g','g','g','g','g','g','g','y','y'],
  ['w','w','w','w','w','w','w','g','g','g','g','g','g','g','g','y','y','y'],
  ['w','w','w','w','w','w','g','g','g','g','g','g','g','y','y','y','y','y'],
  ['w','w','w','w','w','g','g','g','g','g','g','y','y','y','y','y','y','y'],
  ['w','w','w','w','g','g','g','g','g','g','y','y','y','y','y','y','y','y'],
  ['w','w','w','g','g','g','g','g','g','y','y','y','y','y','y','y','y','y'],
  ['w','w','g','g','g','g','g','g','y','y','y','y','y','y','y','y','y','y'],
  ['w','g','g','g','g','g','g','y','y','y','y','y','y','y','y','y','y','r'],
  ['g','g','g','g','g','g','y','y','y','y','y','y','y','y','y','y','r','r'],
  ['g','g','g','g','g','y','y','y','y','y','y','y','y','y','y','r','r','r'],
  ['g','g','g','g','y','y','y','y','y','y','y','y','y','r','r','r','r','r'],
  ['g','g','g','y','y','y','y','y','y','y','y','r','r','r','r','r','r','r'],
  ['g','g','y','y','y','y','y','y','y','r','r','r','r','r','r','r','r','r'],
  ['g','y','y','y','y','y','y','r','r','r','r','r','r','r','r','r','r','r'],
  ['y','y','y','y','y','r','r','r','r','r','r','r','r','r','r','r','r','r'],
  ['y','y','y','r','r','r','r','r','r','r','r','r','r','r','r','r','r','r'],
  ['r','r','r','r','r','r','r','r','r','r','r','r','r','r','r','r','r','r'],
];

const ROLL_RANGES = [
  [1,1],[2,3],[4,6],[7,10],[11,15],[16,20],[21,25],[26,30],
  [31,35],[36,40],[41,45],[46,50],[51,55],[56,60],[61,65],[66,70],
  [71,75],[76,80],[81,85],[86,90],[91,94],[95,97],[98,99],[100,100]
];

const COLOR_NAMES = {w:'White',g:'Green',y:'Yellow',r:'Red'};

// ══════════════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════════════

function makeCols() {
  let c = '<colgroup><col class="ut-col-roll">';
  for (let i = 0; i < 18; i++) c += '<col class="ut-col-rank">';
  c += '</colgroup>';
  return c;
}

function buildActionTable() {
  const cols = makeCols();
  let h = '<tr><th class="ut-col-roll"></th>';
  ACTIONS.forEach(a => {
    h += `<th class="ut-col-rank"><div class="at-name">${a.name.replace(/\n/g,'<br>')}</div><div class="at-abbr">${a.abbr}</div><div class="at-ability">${a.ability.replace(/\n/g,'<br>')}</div></th>`;
  });
  h += '</tr>';
  let body = '';
  RESULT_ROWS.forEach(r => {
    body += `<tr class="${r.cls}"><td class="row-label">${r.label}</td>`;
    r.data.forEach(d => { body += `<td>${d}</td>`; });
    body += '</tr>';
  });
  document.getElementById('action-mount').innerHTML =
    `<table class="action-tbl">${cols}<thead>${h}</thead><tbody>${body}</tbody></table>`;
}

function buildRankTable() {
  const cols = makeCols();
  let r1 = '<tr><th class="ut-col-roll"></th>';
  RANKS.forEach(r => { r1 += `<th class="ut-col-rank"><div class="rk-abbr">${r.abbr}</div><div class="rk-name">${r.name}</div></th>`; });
  r1 += '</tr>';
  let r2 = '<tr><th></th>';
  RANKS.forEach(r => { r2 += `<td class="rk-val">${r.val}</td>`; });
  r2 += '</tr>';
  let r3 = '<tr><th></th>';
  RANKS.forEach(r => { r3 += `<td class="rk-range">${r.range}</td>`; });
  r3 += '</tr>';
  document.getElementById('rank-mount').innerHTML =
    `<table class="rank-tbl">${cols}<thead>${r1}</thead><tbody>${r2}${r3}</tbody></table>`;
}

function buildGrid() {
  const cols = makeCols();
  let hdr = '<tr><th class="ut-col-roll">Roll</th>';
  RANK_LABELS.forEach((lbl, i) => { hdr += `<th class="ut-col-rank" data-col="${i}">${lbl}</th>`; });
  hdr += '</tr>';
  let body = '';
  ROLL_ROWS.forEach((roll, ri) => {
    body += `<tr data-row="${ri}">`;
    body += `<td class="ut-roll">${roll}</td>`;
    TABLE_DATA[ri].forEach((c, ci) => {
      body += `<td class="c-${c}" data-col="${ci}" data-row="${ri}"></td>`;
    });
    body += '</tr>';
  });
  document.getElementById('grid-mount').innerHTML =
    `<table class="ut-grid" id="ut-grid">${cols}<thead>${hdr}</thead><tbody id="ut-body">${body}</tbody></table>`;
}

// ══════════════════════════════════════════════════════════════
// CELL HOVER — crosshair + tooltip
// ══════════════════════════════════════════════════════════════

function wireCellHover() {
  const grid = document.getElementById('ut-grid');
  const tip = document.getElementById('ut-tip');
  let curCell = null;

  grid.addEventListener('mouseover', e => {
    const td = e.target.closest('td[data-col][data-row]');
    if (td === curCell) return;
    clearHL();
    curCell = td;
    if (!td) { tip.style.display = 'none'; return; }

    const col = parseInt(td.dataset.col);
    const row = parseInt(td.dataset.row);
    const color = TABLE_DATA[row][col];

    td.classList.add('cell-hl');
    grid.querySelectorAll(`td[data-col="${col}"]`).forEach(el => el.classList.add('col-hl'));
    const tr = td.parentElement;
    tr.querySelectorAll('td').forEach(el => el.classList.add('row-hl'));
    td.classList.add('cell-hl');

    tip.textContent = `${ROLL_ROWS[row]} / ${RANKS[col].name} (${RANKS[col].abbr}) \u2192 ${COLOR_NAMES[color]}`;
    tip.style.display = 'block';
  });

  grid.addEventListener('mousemove', e => {
    if (tip.style.display === 'block') {
      tip.style.left = (e.clientX + 12) + 'px';
      tip.style.top = (e.clientY - 28) + 'px';
    }
  });

  grid.addEventListener('mouseleave', () => {
    clearHL();
    curCell = null;
    tip.style.display = 'none';
  });

  function clearHL() {
    grid.querySelectorAll('.cell-hl,.col-hl,.row-hl').forEach(el => {
      el.classList.remove('cell-hl','col-hl','row-hl');
    });
  }
}

// ══════════════════════════════════════════════════════════════
// DICE ROLLER
// ══════════════════════════════════════════════════════════════

function wireDice() {
  const btn = document.getElementById('btn-roll');
  const result = document.getElementById('dice-result');
  const colorBox = document.getElementById('dice-color');

  btn.addEventListener('click', () => {
    const roll = Math.floor(Math.random() * 100) + 1;
    result.textContent = roll;

    document.querySelectorAll('#ut-body tr.dice-hl').forEach(r => r.classList.remove('dice-hl'));

    for (let i = 0; i < ROLL_RANGES.length; i++) {
      if (roll >= ROLL_RANGES[i][0] && roll <= ROLL_RANGES[i][1]) {
        const row = document.querySelector(`#ut-body tr[data-row="${i}"]`);
        if (row) {
          row.classList.add('dice-hl');
          row.scrollIntoView({behavior:'smooth', block:'nearest'});
        }
        break;
      }
    }

    colorBox.style.background = '#ddd';
    colorBox.title = `Roll: ${roll}`;
  });
}

// ══════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════

document.addEventListener('DOMContentLoaded', () => {
  buildActionTable();
  buildRankTable();
  buildGrid();
  wireCellHover();
  wireDice();

  document.getElementById('btn-print').addEventListener('click', () => window.print());
});
</script>
</body>
</html>
