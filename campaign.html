<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mighty Protectors — Campaign</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Bitter:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --hdr-bg: #1a1430;
  --hdr-border: #c04010;
  --gold: #e8a820;
  --red: #c04010;
  --red-lt: #d85020;
  --green: #5a9a18;
  --page-bg: #d6eaf8;
  --page-bg2: #c4dff0;
  --tx: #1a1a2a;
  --tx2: #4a3a5a;
  --tx3: #7a7a8a;
  --danger: #d03030;
  --fd: 'Bangers', cursive;
  --fb: 'Bitter', serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }
html { min-height: 100%; background: var(--page-bg) }
body { min-height: 100vh; background: var(--page-bg); color: var(--tx); font-family: var(--fb); font-size: 13px; display: flex; flex-direction: column }

/* ── Header ── */
.hdr { background: var(--hdr-bg); border-bottom: 3px solid var(--hdr-border); padding: 0 16px; flex-shrink: 0 }
.hdr-in { max-width: 920px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 52px; gap: 12px }
.hdr-logo { display: flex; align-items: center; gap: 10px }
.hdr-logo img { height: 26px; display: block }
.hdr-logo-sub { font-family: var(--fb); font-size: 10px; color: var(--gold); letter-spacing: 1.5px; font-weight: 700; opacity: 0.85 }
.hdr-nav { display: flex; gap: 4px; align-items: center }
.hdr-nav a {
  padding: 5px 12px; font-size: 10px; font-family: var(--fb); font-weight: 700;
  color: #ccc; text-decoration: none; border-radius: 3px; transition: all 0.12s;
}
.hdr-nav a:hover { color: #fff; background: rgba(255,255,255,0.08) }
.hdr-nav a.active { color: var(--gold); background: rgba(232,168,32,0.12) }

/* ── Main ── */
.main { flex: 1; padding: 16px 16px 40px }
.main-in { max-width: 920px; margin: 0 auto }

/* ── Campaign header ── */
.camp-header { margin-bottom: 20px }
.camp-title-row { display: flex; align-items: baseline; gap: 10px; margin-bottom: 6px }
.camp-title { font-family: var(--fd); font-size: 28px; letter-spacing: 1px; color: var(--hdr-bg) }
.camp-edit-btn {
  font-size: 10px; font-family: var(--fb); font-weight: 700; color: var(--tx3);
  border: 1px solid #ccc; background: #fff; border-radius: 3px; padding: 3px 8px;
  cursor: pointer; transition: all 0.12s;
}
.camp-edit-btn:hover { border-color: var(--red); color: var(--red) }
.camp-desc {
  font-size: 12px; color: var(--tx2); line-height: 1.6; max-width: 700px;
  border: 1px solid transparent; padding: 4px; border-radius: 3px; min-height: 40px;
}
.camp-desc:focus { border-color: var(--red); outline: none; background: #fff }
.camp-gm { font-size: 11px; color: var(--tx3); margin-top: 6px; font-weight: 700 }

/* ── Section ── */
.section { margin-bottom: 24px }
.section-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; border-bottom: 2px solid var(--hdr-bg); padding-bottom: 4px }
.section-title { font-family: var(--fd); font-size: 18px; letter-spacing: 0.5px; color: var(--hdr-bg) }
.section-title-hero { color: #D06020 }
.section-title-neutral { color: #2070C0 }
.section-title-villain { color: #40901a }
.section-title-vehicle { color: #2070C0 }
.btn-add {
  font-size: 10px; font-family: var(--fb); font-weight: 700; color: var(--red);
  border: 1.5px solid var(--red); background: #fff; border-radius: 3px;
  padding: 3px 10px; cursor: pointer; transition: all 0.12s;
}
.btn-add:hover { background: var(--red); color: #fff }
.section-empty { font-size: 11px; color: var(--tx3); font-style: italic; padding: 8px 0 }

/* ── Card grid (reused from dashboard) ── */
.card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px }
.card {
  border-radius: 5px; overflow: hidden; background: #fff;
  box-shadow: 0 2px 6px rgba(0,0,0,0.13); border: 2px solid #222;
  transition: box-shadow 0.15s, transform 0.1s;
}
.card:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.2); transform: translateY(-2px) }
.card-content { display: flex; align-items: flex-start; gap: 8px; padding: 8px 10px 6px 8px; cursor: pointer }
.card-thumb {
  width: 56px; height: 56px; flex-shrink: 0; border-radius: 4px; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  background: #f0f0ec; border: 3px solid #999;
}
.card-thumb svg { opacity: 0.18; color: #555 }
.card-info { flex: 1; min-width: 0 }
.card-name-row { display: flex; align-items: baseline; gap: 6px }
.card-name {
  font-family: var(--fd); font-size: 18px; letter-spacing: 1px; line-height: 1.15;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  -webkit-text-stroke: 0.7px rgba(0,0,0,0.2);
}
.card-side-badge {
  font-family: var(--fb); font-size: 8px; font-weight: 700;
  padding: 1px 5px; border-radius: 2px; letter-spacing: 0.5px;
  text-transform: uppercase; flex-shrink: 0; color: #fff;
}
.card-sub { font-size: 10px; color: #444; margin-top: 2px; font-weight: 700 }
.card-bcs { font-family: monospace; font-size: 9px; color: #555; margin-top: 3px; font-weight: 700 }
.card-derived { font-size: 10px; font-weight: 700; color: #222; margin-top: 2px }
.card-derived span { margin-right: 8px }
.card-actions { display: flex; border-top: 2px solid #222; background: #fafaf6 }
.card-btn {
  flex: 1; padding: 4px 0; font-size: 9px; font-family: var(--fb); font-weight: 700;
  border: none; background: transparent; cursor: pointer; color: #444;
  text-align: center; transition: all 0.12s; border-right: 1px solid #ddd;
}
.card-btn:last-child { border-right: none }
.card-btn:hover { background: #eee }
.card-btn-del { color: #cc2020 }
.card-btn-del:hover { background: #ffe8e8 }

/* Side colors */
.side-good .card-name { color: #D06020; -webkit-text-stroke: 0.8px #803010; text-shadow: 1px 1px 0 rgba(128,48,16,0.2) }
.side-good .card-thumb { border-color: #F07830 }
.side-good .card-side-badge { background: #F07830 }
.side-neutral .card-name { color: #2070C0; -webkit-text-stroke: 0.8px #0a3060; text-shadow: 1px 1px 0 rgba(10,48,96,0.2) }
.side-neutral .card-thumb { border-color: #3080D0 }
.side-neutral .card-side-badge { background: #3080D0 }
.side-evil .card-name { color: #40901a; -webkit-text-stroke: 0.8px #1a4a00; text-shadow: 1px 1px 0 rgba(26,74,0,0.2) }
.side-evil .card-thumb { border-color: #50B820 }
.side-evil .card-side-badge { background: #50B820 }
.side-none .card-name { color: #333 }
.side-none .card-thumb { border-color: #999 }
.side-vehicle .card-name { color: #2070C0; -webkit-text-stroke: 0.8px #0a3060 }
.side-vehicle .card-thumb { border-color: #3080D0 }

/* ── Session Log ── */
.log-entry {
  background: #fff; border: 1.5px solid #ddd; border-radius: 4px;
  padding: 10px 12px; margin-bottom: 8px;
  transition: border-color 0.12s;
}
.log-entry:hover { border-color: #aaa }
.log-hdr { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 4px }
.log-title { font-family: var(--fd); font-size: 14px; color: var(--hdr-bg); letter-spacing: 0.5px }
.log-date { font-size: 10px; color: var(--tx3) }
.log-actions { display: flex; gap: 6px }
.log-actions button {
  font-size: 9px; font-family: var(--fb); font-weight: 700; color: var(--tx3);
  border: 1px solid #ddd; background: #fff; border-radius: 2px; padding: 2px 6px;
  cursor: pointer; transition: all 0.12s;
}
.log-actions button:hover { border-color: var(--red); color: var(--red) }
.log-body { font-size: 11px; color: var(--tx2); line-height: 1.5 }
.log-body textarea {
  width: 100%; min-height: 50px; border: 1px solid #ccc; border-radius: 3px;
  font-family: var(--fb); font-size: 11px; padding: 6px; outline: none; resize: vertical;
}
.log-body textarea:focus { border-color: var(--red) }

/* ── GM Notes ── */
.notes-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px }
.note-box { background: #fff; border: 1.5px solid #ddd; border-radius: 4px; padding: 10px 12px }
.note-label { font-family: var(--fd); font-size: 14px; margin-bottom: 6px; letter-spacing: 0.5px }
.note-label-public { color: var(--green) }
.note-label-private { color: var(--danger) }
.note-textarea {
  width: 100%; min-height: 100px; border: 1px solid #ddd; border-radius: 3px;
  font-family: var(--fb); font-size: 11px; padding: 8px; outline: none;
  resize: vertical; line-height: 1.5;
}
.note-textarea:focus { border-color: var(--red) }

/* ── Divider ── */
.divider { border: none; border-top: 2px solid var(--page-bg2); margin: 20px 0 }

/* ── Footer ── */
.ftr { font-size: 9px; color: var(--tx3); text-align: center; padding: 10px; background: var(--page-bg2); border-top: 1px solid #8ab4d0 }

/* ── Responsive ── */
@media (max-width: 600px) {
  .hdr-in { height: 44px }
  .card-grid { grid-template-columns: 1fr }
  .notes-grid { grid-template-columns: 1fr }
  .camp-title { font-size: 22px }
}

/* ── Animations ── */
@keyframes fadeSlideUp { from { opacity: 0; transform: translateY(12px) } to { opacity: 1; transform: translateY(0) } }
.card { animation: fadeSlideUp 0.3s ease both }
.card:nth-child(1) { animation-delay: 0s }
.card:nth-child(2) { animation-delay: 0.05s }
.card:nth-child(3) { animation-delay: 0.1s }
</style>
</head>
<body>

<!-- Header -->
<div class="hdr">
  <div class="hdr-in">
    <div class="hdr-logo">
      <img src="MP_logo_v3.png" alt="Mighty Protectors">
      <span class="hdr-logo-sub">BUILDER</span>
    </div>
    <div class="hdr-nav">
      <a href="index.html">Dashboard</a>
      <a href="campaign.html" class="active">Campaign</a>
    </div>
  </div>
</div>

<!-- Main -->
<div class="main">
<div class="main-in">

  <!-- Campaign Header -->
  <div class="camp-header">
    <div class="camp-title-row">
      <span class="camp-title" id="camp-title"></span>
      <button class="camp-edit-btn" id="btn-edit-camp">✎ Edit</button>
    </div>
    <div class="camp-desc" id="camp-desc" contenteditable="true" data-placeholder="Add a campaign description..."></div>
    <div class="camp-gm">GM: <span id="camp-gm">—</span></div>
  </div>

  <hr class="divider">

  <!-- Heroes -->
  <div class="section" id="sec-heroes">
    <div class="section-hdr">
      <span class="section-title section-title-hero">HEROES</span>
      <button class="btn-add" data-new-side="Good">+ New Hero</button>
    </div>
    <div class="card-grid" id="grid-heroes"></div>
  </div>

  <!-- Neutrals -->
  <div class="section" id="sec-neutrals">
    <div class="section-hdr">
      <span class="section-title section-title-neutral">NEUTRALS</span>
      <button class="btn-add" data-new-side="Neutral">+ New Neutral</button>
    </div>
    <div class="card-grid" id="grid-neutrals"></div>
  </div>

  <!-- Villains -->
  <div class="section" id="sec-villains">
    <div class="section-hdr">
      <span class="section-title section-title-villain">VILLAINS</span>
      <button class="btn-add" data-new-side="Evil">+ New Villain</button>
    </div>
    <div class="card-grid" id="grid-villains"></div>
  </div>

  <!-- Vehicles -->
  <div class="section" id="sec-vehicles">
    <div class="section-hdr">
      <span class="section-title section-title-vehicle">VEHICLES</span>
      <button class="btn-add" data-new-type="vehicle">+ New Vehicle</button>
    </div>
    <div class="card-grid" id="grid-vehicles"></div>
  </div>

  <hr class="divider">

  <!-- Session Log -->
  <div class="section">
    <div class="section-hdr">
      <span class="section-title">SESSION LOG</span>
      <button class="btn-add" id="btn-new-session">+ New Entry</button>
    </div>
    <div id="session-log"></div>
  </div>

  <hr class="divider">

  <!-- GM Notes -->
  <div class="section">
    <div class="section-hdr">
      <span class="section-title">GM NOTES</span>
    </div>
    <div class="notes-grid">
      <div class="note-box">
        <div class="note-label note-label-public">📢 Public Notes</div>
        <textarea class="note-textarea" id="notes-public" placeholder="Notes visible to players..."></textarea>
      </div>
      <div class="note-box">
        <div class="note-label note-label-private">🔒 Private Notes</div>
        <textarea class="note-textarea" id="notes-private" placeholder="GM-only secrets, plot hooks, upcoming twists..."></textarea>
      </div>
    </div>
  </div>

</div>
</div>

<div class="ftr">Mighty Protectors is a registered trademark of Monkey House Games.</div>

<script>
// ── Storage (shared keys with index.html) ──
const CHARS_KEY = 'mp-char-list';
const VEHS_KEY = 'mp-veh-list';
const CAMP_KEY = 'mp-campaigns';
const CAMP_SEL_KEY = 'mp-campaign-sel';
const CAMP_DATA_KEY = 'mp-campaign-data';

function loadList(key) { try { return JSON.parse(localStorage.getItem(key)) || []; } catch(e) { return []; } }
function saveList(key, list) { try { localStorage.setItem(key, JSON.stringify(list)); } catch(e) {} }
function loadCampaigns() { try { return JSON.parse(localStorage.getItem(CAMP_KEY)) || []; } catch(e) { return []; } }
function saveCampaigns(list) { try { localStorage.setItem(CAMP_KEY, JSON.stringify(list)); } catch(e) {} }
function getActiveCampaign() { return localStorage.getItem(CAMP_SEL_KEY) || ''; }
function escH(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

// ── Campaign data (description, notes, session log) ──
function loadCampData(campId) {
  try {
    const all = JSON.parse(localStorage.getItem(CAMP_DATA_KEY)) || {};
    return all[campId] || { desc: '', gm: '', publicNotes: '', privateNotes: '', sessions: [] };
  } catch(e) { return { desc: '', gm: '', publicNotes: '', privateNotes: '', sessions: [] }; }
}
function saveCampData(campId, data) {
  try {
    const all = JSON.parse(localStorage.getItem(CAMP_DATA_KEY)) || {};
    all[campId] = data;
    localStorage.setItem(CAMP_DATA_KEY, JSON.stringify(all));
  } catch(e) {}
}

const campId = getActiveCampaign();
const camps = loadCampaigns();
const camp = camps.find(c => c.id === campId);
const campData = loadCampData(campId);

// ── Populate campaign header ──
document.getElementById('camp-title').textContent = camp ? camp.name : 'No Campaign';
document.getElementById('camp-desc').textContent = campData.desc || '';
document.getElementById('camp-gm').textContent = campData.gm || '—';

// Save description on blur
document.getElementById('camp-desc').addEventListener('blur', () => {
  campData.desc = document.getElementById('camp-desc').textContent.trim();
  saveCampData(campId, campData);
});

// Edit button — rename campaign
document.getElementById('btn-edit-camp').addEventListener('click', () => {
  const name = prompt('Campaign name:', camp ? camp.name : '');
  if (!name || !name.trim()) return;
  if (camp) { camp.name = name.trim(); saveCampaigns(camps); }
  document.getElementById('camp-title').textContent = name.trim();
  const gm = prompt('GM name:', campData.gm || '');
  if (gm !== null) { campData.gm = gm.trim(); saveCampData(campId, campData); document.getElementById('camp-gm').textContent = gm.trim() || '—'; }
});

// ── Render character cards ──
const thumbSvg = `<svg viewBox="0 0 24 24" width="26" height="26"><circle cx="12" cy="9" r="4" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M4 22c0-4.4 3.6-8 8-8s8 3.6 8 8" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>`;
const vehSvg = `<svg viewBox="0 0 24 24" width="26" height="26"><rect x="2" y="8" width="20" height="10" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/><circle cx="7" cy="18" r="2" fill="none" stroke="currentColor" stroke-width="1.3"/><circle cx="17" cy="18" r="2" fill="none" stroke="currentColor" stroke-width="1.3"/></svg>`;

function sideClass(side) {
  if (!side) return 'side-none';
  const s = side.toLowerCase();
  if (s === 'good') return 'side-good';
  if (s === 'evil') return 'side-evil';
  if (s === 'neutral') return 'side-neutral';
  return 'side-none';
}

function renderCharCard(c, idx) {
  const name = c.name || 'Unnamed';
  const species = c.species || '';
  const side = c.side || '';
  let totalCPs = 0;
  if (c.stats) { for (const s of Object.values(c.stats)) totalCPs += parseFloat(s.cp) || 0; }
  if (c.abilities) { for (const ab of c.abilities) totalCPs += parseFloat(ab.cp) || 0; }
  const cpsStr = totalCPs ? totalCPs + ' CPs' : '';
  let bcLine = '';
  if (c.stats) {
    bcLine = ['st','en','ag','in','cl'].map(k => {
      const v = c.stats[k] ? (c.stats[k].cp || '0') : '0';
      return k.toUpperCase() + '\u2009' + v;
    }).join('  ');
  }
  const subParts = [cpsStr, species].filter(Boolean);
  const bits = [];
  if (c.power) bits.push('<span>Power ' + escH(c.power) + '</span>');
  if (c.hitPts) bits.push('<span>HP ' + escH(c.hitPts) + '</span>');
  if (c.initiative) bits.push('<span>Init ' + escH(c.initiative) + '</span>');
  const derivedHtml = bits.length ? bits.join('') : '';
  const sideBadge = side ? `<span class="card-side-badge">${escH(side.toUpperCase())}</span>` : '';
  const thumb = c._image ? `<img src="${c._image}" alt="">` : thumbSvg;
  return `<div class="card ${sideClass(side)}" data-type="char" data-idx="${idx}">
    <div class="card-content" data-action="edit">
      <div class="card-thumb">${thumb}</div>
      <div class="card-info">
        <div class="card-name-row"><div class="card-name">${escH(name)}</div>${sideBadge}</div>
        <div class="card-sub">${escH(subParts.join(' · '))}</div>
        ${bcLine ? `<div class="card-bcs">${escH(bcLine)}</div>` : ''}
        ${derivedHtml ? `<div class="card-derived">${derivedHtml}</div>` : ''}
      </div>
    </div>
    <div class="card-actions">
      <button class="card-btn" data-action="edit">EDIT</button>
      <button class="card-btn" data-action="view">VIEW</button>
    </div>
  </div>`;
}

function renderVehCard(v, idx) {
  const name = v.name || 'Unnamed';
  const model = v.model || '';
  let totalCost = (v.basicCost || 0) + (v.techMod || 0) + (v.maneuverMod || 0);
  if (v.wontExplode) totalCost += 5;
  if (v.isBase) totalCost -= 15;
  if (v.systems) { for (const s of v.systems) totalCost += (s.extraCPs || 0); }
  const cpsStr = totalCost ? totalCost + ' CPs' : '';
  const spaces = v.spaces ? v.spaces + ' spc' : '';
  const subParts = [cpsStr, spaces].filter(Boolean);
  const bits = [];
  if (v.totalHits) bits.push('<span>Hits ' + escH(String(v.totalHits)) + '</span>');
  if (v.totalPower) bits.push('<span>Power ' + escH(String(v.totalPower)) + '</span>');
  const derivedHtml = bits.length ? bits.join('') : '';
  const thumb = v._image ? `<img src="${v._image}" alt="">` : vehSvg;
  return `<div class="card side-vehicle" data-type="veh" data-idx="${idx}">
    <div class="card-content" data-action="edit-veh">
      <div class="card-thumb">${thumb}</div>
      <div class="card-info">
        <div class="card-name-row"><div class="card-name">${escH(name)}</div></div>
        <div class="card-sub">${escH(subParts.join(' · '))}</div>
        ${model ? `<div class="card-bcs">${escH(model)}</div>` : ''}
        ${derivedHtml ? `<div class="card-derived">${derivedHtml}</div>` : ''}
      </div>
    </div>
    <div class="card-actions">
      <button class="card-btn" data-action="edit-veh">EDIT</button>
      <button class="card-btn" data-action="view-veh">VIEW</button>
    </div>
  </div>`;
}

// ── Render all sections ──
function renderAll() {
  const chars = loadList(CHARS_KEY);
  const vehs = loadList(VEHS_KEY);

  const heroes = [], neutrals = [], villains = [], noSide = [];
  chars.forEach((c, i) => {
    const s = (c.side || '').toLowerCase();
    if (s === 'good') heroes.push({ c, i });
    else if (s === 'evil') villains.push({ c, i });
    else if (s === 'neutral') neutrals.push({ c, i });
    else noSide.push({ c, i });
  });
  // Unassigned go into neutrals
  noSide.forEach(x => neutrals.push(x));

  const heroGrid = document.getElementById('grid-heroes');
  heroGrid.innerHTML = heroes.length ? heroes.map(x => renderCharCard(x.c, x.i)).join('') : '<div class="section-empty">No heroes yet.</div>';

  const neutGrid = document.getElementById('grid-neutrals');
  neutGrid.innerHTML = neutrals.length ? neutrals.map(x => renderCharCard(x.c, x.i)).join('') : '<div class="section-empty">No neutrals.</div>';

  const villGrid = document.getElementById('grid-villains');
  villGrid.innerHTML = villains.length ? villains.map(x => renderCharCard(x.c, x.i)).join('') : '<div class="section-empty">No villains yet.</div>';

  const vehGrid = document.getElementById('grid-vehicles');
  vehGrid.innerHTML = vehs.length ? vehs.map((v, i) => renderVehCard(v, i)).join('') : '<div class="section-empty">No vehicles.</div>';
}
renderAll();

// ── Click handling ──
document.addEventListener('click', (e) => {
  const action = e.target.closest('[data-action]');
  if (!action) return;
  const card = action.closest('.card');
  if (!card) return;
  const type = card.dataset.type;
  const idx = parseInt(card.dataset.idx);
  const act = action.dataset.action;

  if ((act === 'edit' || act === 'view') && type === 'char') {
    const list = loadList(CHARS_KEY);
    localStorage.setItem('mp-char-sheet', JSON.stringify(list[idx]));
    localStorage.setItem('mp-char-edit-idx', idx);
    window.location.href = 'character.html';
  }
  if ((act === 'edit-veh' || act === 'view-veh') && type === 'veh') {
    const list = loadList(VEHS_KEY);
    localStorage.setItem('mp-vehicle-autosave', JSON.stringify(list[idx]));
    localStorage.setItem('mp-veh-edit-idx', idx);
    window.location.href = 'vehicle.html';
  }
});

// ── New character/vehicle buttons ──
document.querySelectorAll('[data-new-side]').forEach(btn => {
  btn.addEventListener('click', () => {
    const side = btn.dataset.newSide;
    localStorage.removeItem('mp-char-sheet');
    localStorage.setItem('mp-char-edit-idx', '-1');
    localStorage.setItem('mp-char-campaign', campId);
    localStorage.setItem('mp-char-default-side', side);
    window.location.href = 'character.html';
  });
});
document.querySelector('[data-new-type="vehicle"]').addEventListener('click', () => {
  localStorage.removeItem('mp-vehicle-autosave');
  localStorage.setItem('mp-veh-edit-idx', '-1');
  localStorage.setItem('mp-veh-campaign', campId);
  window.location.href = 'vehicle.html';
});

// ── Session Log ──
function renderSessions() {
  const container = document.getElementById('session-log');
  const sessions = campData.sessions || [];
  if (!sessions.length) {
    container.innerHTML = '<div class="section-empty">No session entries yet.</div>';
    return;
  }
  container.innerHTML = sessions.map((s, i) => `
    <div class="log-entry" data-session="${i}">
      <div class="log-hdr">
        <span class="log-title">#${sessions.length - i} — ${escH(s.date || 'No date')}</span>
        <div class="log-actions">
          <button data-ses-action="edit" data-ses-idx="${i}">Edit</button>
          <button data-ses-action="del" data-ses-idx="${i}" style="color:var(--danger)">Del</button>
        </div>
      </div>
      <div class="log-body">${escH(s.text || '')}</div>
    </div>
  `).join('');
}
renderSessions();

document.getElementById('btn-new-session').addEventListener('click', () => {
  const today = new Date().toISOString().split('T')[0];
  const date = prompt('Session date:', today);
  if (date === null) return;
  const text = prompt('Session summary:');
  if (text === null) return;
  if (!campData.sessions) campData.sessions = [];
  campData.sessions.unshift({ date: date, text: text });
  saveCampData(campId, campData);
  renderSessions();
});

document.getElementById('session-log').addEventListener('click', (e) => {
  const btn = e.target.closest('[data-ses-action]');
  if (!btn) return;
  const idx = parseInt(btn.dataset.sesIdx);
  const action = btn.dataset.sesAction;
  if (action === 'edit') {
    const s = campData.sessions[idx];
    const date = prompt('Session date:', s.date || '');
    if (date === null) return;
    const text = prompt('Session summary:', s.text || '');
    if (text === null) return;
    s.date = date;
    s.text = text;
    saveCampData(campId, campData);
    renderSessions();
  }
  if (action === 'del') {
    if (!confirm('Delete this session entry?')) return;
    campData.sessions.splice(idx, 1);
    saveCampData(campId, campData);
    renderSessions();
  }
});

// ── GM Notes (auto-save on input) ──
document.getElementById('notes-public').value = campData.publicNotes || '';
document.getElementById('notes-private').value = campData.privateNotes || '';

document.getElementById('notes-public').addEventListener('input', () => {
  campData.publicNotes = document.getElementById('notes-public').value;
  saveCampData(campId, campData);
});
document.getElementById('notes-private').addEventListener('input', () => {
  campData.privateNotes = document.getElementById('notes-private').value;
  saveCampData(campId, campData);
});
</script>
